name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect which areas of the codebase changed ───────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            go:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - 'cmd/**'
              - 'internal/**'
            python:
              - 'tests/**'
              - 'ruff.toml'
              - 'tests/wandb-conformance/pyproject.toml'
            frontend:
              - 'frontend/**'

  # ── Go unit/integration tests ────────────────────────────────────────
  go-test:
    name: Go Tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: extractions/setup-just@v2
      - run: just test

  # ── Lint (prek hooks — Go, Python, frontend) ─────────────────────────
  lint:
    name: Lint (prek hooks)
    needs: changes
    if: |
      needs.changes.outputs.go == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@v4
      - uses: extractions/setup-just@v2
      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest
      - run: just ci-lint

  # ── SDK conformance tests (expensive — only on backend changes) ──────
  conformance:
    name: SDK Conformance Tests
    needs: changes
    if: needs.changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: astral-sh/setup-uv@v4
      - uses: extractions/setup-just@v2
      - run: just conformance-ci
